{% load static %}
<li class="product-card">
  <a class="product-card__link" href="/products/{{ product.id }}">
    {% if product.image %}
        <img class="product-card__image" src="{% static product.image %}" alt="{{ product.name }}">
    {% else %}
        <img class="product-card__image" src="https://placehold.co/400x400?text=No+Image" alt="{{ product.name }}">
    {% endif %}
    <p class="product-card__name">{{ product.name }}</p>
    <p class="product-card__price">{{ product.price }} грн</p>
</a>
</li>
