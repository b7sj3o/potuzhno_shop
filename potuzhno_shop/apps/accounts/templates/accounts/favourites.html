{% extends 'base.html' %}

{% block title %}Обране — ПОТУЖНО Shop{% endblock %}

{% block content %}
    <h1 class="h3 mb-4">Обране</h1>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4">
        {% for product in products %}
            <div class="col">
                {% include 'partials/product_card.html' with product=product only %}
            </div>
        {% empty %}
            <div class="col-12">
                <div class="alert alert-info mb-0">У вас ще немає обраних товарів.</div>
            </div>
        {% endfor %}
    </div>
{% endblock %}
