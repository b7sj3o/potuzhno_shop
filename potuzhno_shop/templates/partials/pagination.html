{% if is_paginated %}
<nav aria-label="Пагінація каталогу" class="mt-4">
    <ul class="pagination justify-content-center">
        {% if page_obj.has_previous %}
            <li class="page-item">
                <a class="page-link" href="?page={{ page_obj.previous_page_number }}{% for k, v in request.GET.items %}{% if k != 'page' %}&{{ k }}={{ v }}{% endif %}{% endfor %}">← Назад</a>
            </li>
        {% else %}
            <li class="page-item disabled"><span class="page-link">← Назад</span></li>
        {% endif %}

        <li class="page-item disabled">
            <span class="page-link">Сторінка {{ page_obj.number }} із {{ page_obj.paginator.num_pages }}</span>
        </li>

        {% if page_obj.has_next %}
            <li class="page-item">
                <a class="page-link" href="?page={{ page_obj.next_page_number }}{% for k, v in request.GET.items %}{% if k != 'page' %}&{{ k }}={{ v }}{% endif %}{% endfor %}">Далі →</a>
            </li>
        {% else %}
            <li class="page-item disabled"><span class="page-link">Далі →</span></li>
        {% endif %}
    </ul>
</nav>
{% endif %}
